<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantityMeasurementApplication</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel = stylesheet href = "./style.css">
</head>
<body>
    <!--      Navigation Bar       -->
    <nav class="navBar">
        <div class = "logo"><img src="image/logo.png">
            <div class="logoName">Quanment</div>
        </div>
        <div class = "history"><a href="LoginForm.html">History</a></div>
    </nav>

    <!--      Header Component     -->
    <header class = "headerComponent">
        <p>Welcome To Quantity Measurement Application</p>
    </header>


    <!--      Container            -->
    <div class = "container">

       <div class = "childContainer"> 

            <!--    Input Container    -->
            <div class = "inputContainer">

                <!--  Type Container   -->
                <div class = "typeContainer">

                    <div class="quantityType lengthSymbol">
                        <div class = "typeImage"><img src = "image/length.png"></div>
                        <div class = "typeText">Length</div>
                    </div>

                    <div class="quantityType temperatureSymbol" >
                        <div class = "typeImage"><img src = "image/thermometer.png"></div>
                        <div class = "typeText">Temperature</div>
                    </div>

                    <div class="quantityType volumeSymbol">
                        <div class = "typeImage"><img src = "image/volume.png"></div>
                        <div class = "typeText">Volume</div>
                    </div>

                    <div class="quantityType weightSymbol">
                        <div class = "typeImage"><img src = "image/weightSymbol.svg"></div>
                        <div class = "typeText">Weight</div>
                    </div>
                    



                </div>

                <!--  Operation Container  -->
                <div class = "operationContainer">

                    <div class="opType">
                        <img src="image/addition-thick-symbol.png">
                    </div>
                    <div class="opType">
                        <img src = "image/minus.png">
                    </div>
                    <div class="opType">
                        <img src="image/divide.png">
                    </div>
                    <div class="opType">
                        <p>Compare</p>
                    </div>
                    <div class="opType">
                        <p>Convert</p>
                    </div>

                </div>

                <!--  Value Container -->
                <div class = "valueContainer">

                    <div class = "userInputContainer">
                        <div class = "value">
                            <input type="number" placeholder="Enter number">
                        </div>
                        <div class = "unit"></div>
                    </div>
                    <div class = "userInputContainer">
                        <div class = "value">
                            <input type="number" placeholder="Enter number">
                        </div>
                        <div class = "unit"></div>
                    </div>

                </div>

            </div>

        

            <!--     Result Container  -->
            <div class = "resultContainer">


            </div>
        </div>
       
    </div>
</body>
</html>
